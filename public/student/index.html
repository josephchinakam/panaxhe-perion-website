<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal | Panaxhé Périon</title>
  <link rel="stylesheet" href="../css/style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSI4NSIgeD0iNSIgZm9udC1zaXplPSI5NSIgZm9udC13ZWlnaHQ9ImJvbGQiIGZpbGw9IiM4YjVjZjYiPsK2PC90ZXh0Pjwvc3ZnPg==">  
  <style>
    .portal-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }
    .portal-sidebar {
      background-color: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
    }
    .portal-main {
      padding: 2rem 3rem;
      background-color: var(--bg-color);
    }
    .portal-nav {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .portal-nav a {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .portal-nav a:hover, .portal-nav a.active {
      background-color: rgba(120, 81, 169, 0.1);
      color: var(--primary-color);
    }
    [data-theme="dark"] .portal-nav a:hover, [data-theme="dark"] .portal-nav a.active {
      background-color: rgba(139, 92, 246, 0.2);
    }
    @media (max-width: 1024px) {
      .portal-layout { grid-template-columns: 1fr; }
      .portal-sidebar { display: none; }
      .portal-main { padding: 2rem 1rem; }
    }
    /* Loading state stylings */
    .skeleton-loading {
      opacity: 0.6;
      animation: pulse 1.5s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 0.3; }
      100% { opacity: 0.6; }
    }
  </style>
</head>
<body>

  <div class="portal-layout">
    <!-- Sidebar -->
    <aside class="portal-sidebar">
      <a href="../index.html" class="logo">
        <span>Panaxhé<span class="logo-accent">Périon</span></span>
      </a>
      
      <nav class="portal-nav flex-1">
        <a href="#" class="active">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
          Dashboard
        </a>
        <a id="profile-id" href="profile.html">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          My Profile
        </a>
      </nav>
      
      <div style="margin-top: auto;">
        <button id="theme-toggle" class="theme-toggle mb-4" aria-label="Toggle theme">
          <svg id="theme-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
        </button>
        <a href="../login.html" class="portal-nav a text-secondary" style="padding: 0;">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 0.75rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="portal-main">
      <header class="flex justify-between items-center mb-12 skeleton-loading" id="portal-header">
        <div>
          <h2 class="mb-1" id="student-welcome">Welcome back, Student</h2>
          <p class="text-secondary" id="student-id">ID: Loading...</p>
        </div>
        <div id="student-initials" style="width: 48px; height: 48px; border-radius: 50%; background-color: var(--primary-color); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-family: var(--font-sans);">
          --
        </div>
      </header>
      
      <div class="grid grid-3 mb-8">
        <div class="card skeleton-loading" style="padding: 1.5rem;">
          <p class="text-secondary mb-2" style="font-size: 0.875rem;">Registered Course</p>
          <h4 class="mb-2" id="course-title">Loading...</h4>
          <span class="badge badge-primary" id="course-status">--</span>
        </div>
        <div class="card skeleton-loading" style="padding: 1.5rem;">
          <p class="text-secondary mb-2" style="font-size: 0.875rem;">Payment Status</p>
          <h4 class="mb-2" id="payment-status">Loading...</h4>
          <span class="badge badge-gold" id="payment-badge">--</span>
        </div>
        <div class="card skeleton-loading" style="padding: 1.5rem;">
          <p class="text-secondary mb-2" style="font-size: 0.875rem;">Class</p>
          <h4 class="mb-2" id="next-class-title">Loading...</h4>
          <p style="font-size: 0.875rem; color: var(--primary-color);" id="next-class-time">--</p>
        </div>
      </div>
      
      <div class="grid grid-2">
        <div class="card">
          <h3 class="mb-4">Institute Notices</h3>
          <ul id="notices-list" style="display: flex; flex-direction: column; gap: 1rem;">
            <li class="skeleton-loading" style="padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);">
              <div class="text-primary" style="font-size: 0.75rem; font-weight: 600; margin-bottom: 0.25rem;">...</div>
              <p class="mb-0">Loading recent institute announcements...</p>
            </li>
          </ul>
        </div>
        
<!--         <div class="card">
          <h3 class="mb-4">Support & Resources</h3>
          <div style="display: flex; flex-direction: column; gap: 1rem;">
            <a href="#" id="link-handbook" class="btn btn-outline" style="justify-content: flex-start;">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="mr-2" style="margin-right: 0.75rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
              Download Student Handbook
            </a>
            <a href="#" id="link-calendar" class="btn btn-outline" style="justify-content: flex-start;">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="mr-2" style="margin-right: 0.75rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
              Academic Calendar
            </a>
            <a href="#" id="link-support" class="btn btn-outline" style="justify-content: flex-start;">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="mr-2" style="margin-right: 0.75rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
              IT Support Ticket
            </a>
          </div>
        </div> -->
      </div>
    </main>
  </div>

  <script type="module">
    import { initTheme } from '../js/theme.js';
    import { fetchDashboardDataStudent, fetchStudentNotice } from '../js/api.js';

   

    document.addEventListener('DOMContentLoaded', async () => {
      // Initialize theme system
      initTheme();

      const urlParams = new URLSearchParams(window.location.search);
      const studentId = urlParams.get('id');       

      try {
        // Fetch data from the API layout
        const data = await fetchDashboardDataStudent(studentId);

        const notices = await fetchStudentNotice(studentId);
        
        // 1. Render Header info
        document.getElementById('student-welcome').textContent = `Welcome back, ${data.name || 'Student'}`;
        document.getElementById('student-id').textContent = `ID: ${data.id}`;
        document.getElementById('student-initials').textContent = data.initials || 'ST';

        document.getElementById('profile-id').href =  `profile.html?id=${data.email}`;

        // 2. Render Course details card
        document.getElementById('course-title').textContent = data.course.title;
        document.getElementById('course-status').textContent = data.course.status;

        // 3. Render Payment details card
        document.getElementById('payment-status').textContent = data.payment.status;
        document.getElementById('payment-badge').textContent = data.payment.badge;

        // 4. Render Upcoming Class details card
        document.getElementById('next-class-title').textContent = data.class.title;
        document.getElementById('next-class-time').textContent = data.class.duration;

        // 5. Render Resource Links (if paths are dynamic)
        // if (data.resources) {
        //   if (data.resources.handbookUrl) document.getElementById('link-handbook').href = data.resources.handbookUrl;
        //   if (data.resources.calendarUrl) document.getElementById('link-calendar').href = data.resources.calendarUrl;
        //   if (data.resources.supportUrl) document.getElementById('link-support').href = data.resources.supportUrl;
        // }

        // 6. Build the notices list dynamically
        const noticesContainer = document.getElementById('notices-list');
        noticesContainer.innerHTML = ''; // Clear skeleton placeholder
        
        notices.forEach(notice => {
          const li = document.createElement('li');
          li.style.paddingBottom = '1rem';
          li.style.borderBottom = '1px solid var(--border-color)';
          
          li.innerHTML = `
            <div class="text-primary" style="font-size: 0.75rem; font-weight: 600; margin-bottom: 0.25rem;">${notice.date}</div>
            <p class="mb-0">${notice.content}</p>
          `;
          noticesContainer.appendChild(li);
        });

        // Remove loading styles once complete
        document.querySelectorAll('.skeleton-loading').forEach(el => el.classList.remove('skeleton-loading'));

      } catch (error) {
        console.error("Could not load dashboard information:", error);
        // Fallback UI adjustments on error
        document.getElementById('student-id').textContent = "Error loading context.";
      }
    });
  </script>
</body>
</html>
